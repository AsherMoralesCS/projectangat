<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar with Dropdown</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="nav-bar">
        <div id="logo">GFG</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>

                <li class="dropdown">
                    <button class="dropdown-button-nav"
                        onclick="toggleDropdown('about-us-dropdown')">
                        About Us
                    </button>
                    <div id="about-us-dropdown" class="dropdown-contents">
                        <a href="#">Vision</a>
                        <a href="#">Mission</a>
                        <a href="#">Objectives</a>
                    </div>
                </li>

                <li class="dropdown">
                    <button class="dropdown-button-nav"
                        onclick="toggleDropdown('organization-dropdown')">
                        Organization
                    </button>
                    <div id="organization-dropdown" class="dropdown-contents">
                        <a href="#">Governance & Executive Leadership</a>
                        <a href="#">Operations & Administration</a>
                        <a href="#">Programs & External Engagement</a>
                        <a href="#">Research, Monitoring & Support Services</a>
                    </div>
                </li>

                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="content">
    <h1>Welcome to Our Website!</h1>
    <p>Get plenty of knowledge from our wonderful courses.</p>
</section>

<script src="./script.js"></script>
</body>
</html>
